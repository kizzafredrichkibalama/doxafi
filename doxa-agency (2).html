<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doxa — Digital Agency 
  <meta name="description" content="Doxa Digital Agency — bold web experiences built from Kampala to the world. Design, development, branding and Web3." />
  <meta property="og:title" content="Doxa — Digital Agency" />
  <meta property="og:description" content="Strategy. Design. Development. We build digital experiences that command attention." />
  <meta property="og:type" content="website" />
  <link href="https://api.fontshare.com/v2/css?f[]=boska@400,500,700&f[]=satoshi@300,400,500,700&display=swap" rel="stylesheet" />
  <style>
    /* ===================== DESIGN TOKENS ===================== */
    /*
      Art direction: Doxa Digital Agency → Bold, tech-forward, precise
      Brand palette: Exact logo colors — deep royal blue #1a5fa8, electric blue #1e90e0, cyan #22c5f0
      Typography:. Boska (display) + Satoshi (body)
      Density: Spacious sections, dense cards
    */
    :root {
      --text-xs:   clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm:   clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg:   clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl:   clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
      --text-2xl:  clamp(2rem, 1.2rem + 2.5vw, 3.5rem);
      --text-3xl:  clamp(2.5rem, 1rem + 4vw, 5rem);
      --text-hero: clamp(3rem, 0.5rem + 7vw, 8rem);

      --space-1:0.25rem; --space-2:0.5rem; --space-3:0.75rem;
      --space-4:1rem; --space-5:1.25rem; --space-6:1.5rem;
      --space-8:2rem; --space-10:2.5rem; --space-12:3rem;
      --space-16:4rem; --space-20:5rem; --space-24:6rem; --space-32:8rem;

      --radius-sm:0.375rem; --radius-md:0.5rem; --radius-lg:0.75rem;
      --radius-xl:1rem; --radius-full:9999px;
      --transition-interactive: 180ms cubic-bezier(0.16, 1, 0.3, 1);
      --content-narrow:640px; --content-default:960px; --content-wide:1200px;
      --font-display: 'Boska', Georgia, serif;
      --font-body: 'Satoshi', 'Helvetica Neue', sans-serif;
    }

    /* ===== BRAND DARK PALETTE (exact logo colors) ===== */
    :root, [data-theme="dark"] {
      --color-bg:              #060d1a;
      --color-surface:         #0b1526;
      --color-surface-2:       #101d32;
      --color-surface-offset:  #14233c;
      --color-surface-dynamic: #1b2e50;
      --color-divider:         #1a2d4a;
      --color-border:          #223356;

      --color-text:         #ddeeff;
      --color-text-muted:   #7a9ec8;
      --color-text-faint:   #334d6e;
      --color-text-inverse: #060d1a;

      /* Brand blue — exact from logo D mark */
      --color-primary:           #1e90e0;
      --color-primary-hover:     #1a7acc;
      --color-primary-active:    #1460a8;
      --color-primary-highlight: #0d1e38;

      /* Brand cyan — from logo bottom gradient */
      --color-accent:            #22c5f0;
      --color-accent-hover:      #12a8d4;
      --color-accent-highlight:  #0a2030;

      /* Dark royal blue — logo wordmark color */
      --color-brand-deep:        #1a5fa8;

      --color-success: #34d399;
      --color-error:   #f87171;
      --color-warning: #fbbf24;

      --shadow-sm: 0 1px 3px oklch(0 0 0 / 0.35);
      --shadow-md: 0 4px 20px oklch(0 0 0 / 0.50);
      --shadow-lg: 0 16px 56px oklch(0 0 0 / 0.60);
    }

    [data-theme="light"] {
      --color-bg:              #f0f6ff;
      --color-surface:         #f7faff;
      --color-surface-2:       #ffffff;
      --color-surface-offset:  #e4eefb;
      --color-surface-dynamic: #d6e6f8;
      --color-divider:         #c4d8f0;
      --color-border:          #b0c8e8;

      --color-text:         #0b1a30;
      --color-text-muted:   #2e5c8a;
      --color-text-faint:   #7aabce;
      --color-text-inverse: #f0f6ff;

      --color-primary:           #1a5fa8;
      --color-primary-hover:     #134d8e;
      --color-primary-active:    #0d3870;
      --color-primary-highlight: #cce0f4;

      --color-accent:            #1e90e0;
      --color-accent-hover:      #1570b8;
      --color-accent-highlight:  #bcd8f0;

      --color-brand-deep:        #1a5fa8;

      --color-success: #059669;
      --color-error:   #dc2626;
      --color-warning: #d97706;

      --shadow-sm: 0 1px 3px oklch(0.25 0.07 230 / 0.10);
      --shadow-md: 0 4px 16px oklch(0.25 0.07 230 / 0.14);
      --shadow-lg: 0 16px 48px oklch(0.25 0.07 230 / 0.18);
    }

    /* ===================== BASE ===================== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html {
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      scroll-behavior: smooth;
      scroll-padding-top: var(--space-16);
    }
    body {
      min-height: 100dvh;
      font-family: var(--font-body);
      font-size: var(--text-base);
      color: var(--color-text);
      background-color: var(--color-bg);
      line-height: 1.65;
      overflow-x: hidden;
    }
    img, picture, video, canvas, svg { display: block; max-width: 100%; }
    img { height: auto; }
    ul[role="list"], ol[role="list"] { list-style: none; }
    input, button, textarea, select { font: inherit; color: inherit; }
    h1, h2, h3, h4 { text-wrap: balance; line-height: 1.1; }
    p, li { text-wrap: pretty; max-width: 72ch; }
    button { cursor: pointer; background: none; border: none; }
    a { color: inherit; text-decoration: none; }
    ::selection { background: oklch(from var(--color-primary) l c h / 0.28); color: var(--color-text); }
    :focus-visible { outline: 2px solid var(--color-primary); outline-offset: 3px; border-radius: var(--radius-sm); }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border-width: 0; }

    /* ===================== LAYOUT ===================== */
    .container { max-width: var(--content-wide); margin-inline: auto; padding-inline: clamp(var(--space-4), 5vw, var(--space-16)); }
    .container--narrow { max-width: var(--content-default); margin-inline: auto; padding-inline: clamp(var(--space-4), 5vw, var(--space-16)); }

    /* ===================== NAV ===================== */
    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: var(--space-3) 0;
      transition: background var(--transition-interactive), border-color var(--transition-interactive);
      border-bottom: 1px solid transparent;
    }
    .nav.scrolled {
      background: oklch(from var(--color-bg) l c h / 0.88);
      backdrop-filter: blur(20px) saturate(1.5);
      -webkit-backdrop-filter: blur(20px) saturate(1.5);
      border-bottom-color: var(--color-divider);
    }
    .nav__inner {
      max-width: var(--content-wide); margin-inline: auto;
      padding-inline: clamp(var(--space-4), 5vw, var(--space-16));
      display: flex; align-items: center; justify-content: space-between; gap: var(--space-8);
    }
    .nav__logo {
      display: flex; align-items: center; flex-shrink: 0;
      transition: opacity var(--transition-interactive);
    }
    .nav__logo:hover { opacity: 0.85; }
    .nav__logo img { height: 46px; width: auto; }
    /* Light mode: logo has white bg — give it a little padding so it doesn't look naked */
    [data-theme="light"] .nav__logo img { background: white; border-radius: var(--radius-md); padding: 2px 6px; }

    .nav__links { display: flex; align-items: center; gap: var(--space-8); list-style: none; }
    .nav__links a {
      font-size: var(--text-sm); font-weight: 500;
      color: var(--color-text-muted);
      transition: color var(--transition-interactive);
    }
    .nav__links a:hover { color: var(--color-text); }
    .nav__actions { display: flex; align-items: center; gap: var(--space-3); }

    /* ===== BUTTONS ===== */
    .btn {
      display: inline-flex; align-items: center; gap: var(--space-2);
      padding: var(--space-2) var(--space-5);
      font-size: var(--text-sm); font-weight: 600;
      border-radius: var(--radius-full);
      transition: all var(--transition-interactive);
      white-space: nowrap;
    }
    .btn--primary {
      background: var(--color-primary); color: white;
    }
    .btn--primary:hover {
      background: var(--color-primary-hover);
      box-shadow: 0 0 0 4px oklch(from var(--color-primary) l c h / 0.22);
      transform: translateY(-1px);
    }
    .btn--primary:active { transform: translateY(0); }
    .btn--ghost {
      background: transparent; color: var(--color-text-muted);
      border: 1px solid var(--color-border);
    }
    .btn--ghost:hover { color: var(--color-text); border-color: var(--color-primary); }
    .btn--accent {
      background: var(--color-accent); color: var(--color-text-inverse);
    }
    .btn--accent:hover { background: var(--color-accent-hover); transform: translateY(-1px); }

    .theme-toggle {
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      border-radius: var(--radius-full);
      color: var(--color-text-muted);
      border: 1px solid var(--color-border);
      transition: all var(--transition-interactive);
    }
    .theme-toggle:hover { color: var(--color-primary); border-color: var(--color-primary); }

    .nav__hamburger { display: none; flex-direction: column; gap: 5px; padding: var(--space-2); }
    .nav__hamburger span { display: block; width: 22px; height: 2px; background: var(--color-text); border-radius: 2px; transition: all 0.3s ease; }
    .mobile-menu {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: var(--color-bg); z-index: 200;
      flex-direction: column; align-items: center; justify-content: center; gap: var(--space-8);
    }
    .mobile-menu.open { display: flex; }
    .mobile-menu a { font-family: var(--font-display); font-size: var(--text-2xl); font-weight: 500; color: var(--color-text-muted); transition: color var(--transition-interactive); }
    .mobile-menu a:hover { color: var(--color-primary); }
    .mobile-menu__close { position: absolute; top: var(--space-6); right: var(--space-6); font-size: var(--text-xl); color: var(--color-text-muted); }
    @media (max-width: 768px) {
      .nav__links, .nav__actions .btn:not(.nav__actions .theme-toggle) { display: none; }
      .nav__hamburger { display: flex; }
    }

    /* ===================== HERO ===================== */
    .hero {
      min-height: 100svh; display: flex; flex-direction: column; justify-content: flex-end;
      padding-top: 80px; position: relative; overflow: hidden;
    }
    .hero__bg { position: absolute; inset: 0; z-index: 0; background: var(--color-bg); }
    .hero__bg-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.55; }
    .hero__bg-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(in oklab, transparent 10%, var(--color-bg) 80%);
    }
    /* Brand-colored glow orb */
    .hero__glow {
      position: absolute; top: 10%; right: 5%; width: 600px; height: 600px; z-index: 1;
      background: radial-gradient(circle, oklch(from var(--color-primary) l c h / 0.14) 0%, transparent 70%);
      border-radius: 50%; pointer-events: none;
    }
    .hero__noise {
      position: absolute; inset: 0; opacity: 0.035; z-index: 1;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 256px;
    }
    .hero__content {
      position: relative; z-index: 2;
      max-width: var(--content-wide); margin-inline: auto;
      padding-inline: clamp(var(--space-4), 5vw, var(--space-16));
      padding-bottom: clamp(var(--space-12), 8vw, var(--space-24));
    }
    .hero__eyebrow {
      display: inline-flex; align-items: center; gap: var(--space-2);
      font-size: var(--text-xs); font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--color-accent);
      margin-bottom: var(--space-6);
    }
    .hero__eyebrow::before { content: ''; display: block; width: 24px; height: 1px; background: currentColor; }
    .hero__headline {
      font-family: var(--font-display);
      font-size: var(--text-hero); font-weight: 700;
      line-height: 0.95; letter-spacing: -0.03em;
      margin-bottom: var(--space-8); max-width: 14ch;
    }
    .hero__headline em { font-style: italic; color: var(--color-primary); }
    .hero__subline {
      font-size: var(--text-lg); color: var(--color-text-muted);
      max-width: 48ch; line-height: 1.6; margin-bottom: var(--space-10);
    }
    .hero__ctas { display: flex; align-items: center; gap: var(--space-4); flex-wrap: wrap; }
    .hero__ctas .btn { padding: var(--space-3) var(--space-8); font-size: var(--text-base); }
    .hero__scroll-hint {
      position: absolute; bottom: var(--space-8); right: clamp(var(--space-4), 5vw, var(--space-16));
      z-index: 2; display: flex; flex-direction: column; align-items: center; gap: var(--space-2);
      color: var(--color-text-faint); font-size: var(--text-xs); letter-spacing: 0.1em; text-transform: uppercase;
    }
    .hero__scroll-hint svg { animation: bounce 2s ease-in-out infinite; }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(6px)} }

    /* ===================== TICKER ===================== */
    .ticker { padding: var(--space-4) 0; border-top: 1px solid var(--color-divider); border-bottom: 1px solid var(--color-divider); overflow: hidden; }
    .ticker__track { display: flex; gap: var(--space-12); white-space: nowrap; animation: ticker 26s linear infinite; }
    .ticker__item {
      flex-shrink: 0; display: flex; align-items: center; gap: var(--space-3);
      font-size: var(--text-sm); font-weight: 500; color: var(--color-text-muted);
    }
    .ticker__item::before { content: '◆'; color: var(--color-primary); font-size: 0.55em; }
    @keyframes ticker { from{transform:translateX(0)} to{transform:translateX(-50%)} }

    /* ===================== SECTIONS ===================== */
    section { padding-block: clamp(var(--space-16), 8vw, var(--space-32)); }
    .section-label {
      display: inline-flex; align-items: center; gap: var(--space-2);
      font-size: var(--text-xs); font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--color-accent);
      margin-bottom: var(--space-6);
    }
    .section-label::before { content: ''; width: 16px; height: 1px; background: currentColor; }
    .section-heading {
      font-family: var(--font-display); font-size: var(--text-3xl);
      font-weight: 700; line-height: 1.0; letter-spacing: -0.03em;
    }
    .section-heading em { font-style: italic; color: var(--color-primary); }

    /* ===================== ABOUT ===================== */
    .about__grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: clamp(var(--space-8), 6vw, var(--space-20)); align-items: center;
    }
    .about__text .section-heading { margin-bottom: var(--space-6); }
    .about__body { font-size: var(--text-base); color: var(--color-text-muted); line-height: 1.75; margin-bottom: var(--space-6); }
    .about__stats { display: flex; gap: var(--space-10); margin-top: var(--space-8); }
    .stat__number {
      font-family: var(--font-display); font-size: var(--text-2xl);
      font-weight: 700; color: var(--color-text); line-height: 1;
    }
    .stat__label { font-size: var(--text-xs); color: var(--color-text-muted); margin-top: var(--space-1); text-transform: uppercase; letter-spacing: 0.1em; }
    .about__image-col { position: relative; }
    .about__image-main {
      width: 100%; aspect-ratio: 4/5; object-fit: cover;
      border-radius: var(--radius-xl); box-shadow: var(--shadow-lg);
    }
    .about__image-badge {
      position: absolute; bottom: var(--space-6); left: calc(-1 * var(--space-8));
      background: var(--color-surface); border: 1px solid var(--color-border);
      border-radius: var(--radius-xl); padding: var(--space-4) var(--space-5);
      box-shadow: var(--shadow-md); display: flex; align-items: center; gap: var(--space-3);
    }
    .badge-icon { width: 40px; height: 40px; background: var(--color-primary-highlight); border-radius: var(--radius-full); display: flex; align-items: center; justify-content: center; color: var(--color-primary); flex-shrink: 0; }
    .badge-text-main { font-weight: 700; font-size: var(--text-sm); }
    .badge-text-sub { font-size: var(--text-xs); color: var(--color-text-muted); }
    @media (max-width: 768px) {
      .about__grid { grid-template-columns: 1fr; }
      .about__image-badge { left: var(--space-4); }
    }

    /* ===================== SERVICES ===================== */
    .services { background: var(--color-surface); }
    .services__header { margin-bottom: clamp(var(--space-10), 4vw, var(--space-16)); }
    .services__grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-5); }
    .service-card {
      background: var(--color-surface-2);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl); padding: var(--space-8); position: relative; overflow: hidden;
      transition: transform var(--transition-interactive), box-shadow var(--transition-interactive), border-color var(--transition-interactive);
    }
    .service-card:hover {
      transform: translateY(-4px); box-shadow: var(--shadow-md);
      border-color: oklch(from var(--color-primary) l c h / 0.5);
    }
    .service-card--featured {
      grid-column: span 2;
      background: linear-gradient(135deg in oklab, var(--color-primary-highlight) 0%, var(--color-surface-2) 65%);
    }
    .service-card__num {
      font-family: var(--font-display); font-size: var(--text-3xl);
      font-weight: 700; color: var(--color-text-faint); line-height: 1; margin-bottom: var(--space-8);
    }
    .service-card__icon { width: 44px; height: 44px; margin-bottom: var(--space-5); color: var(--color-primary); }
    .service-card__title { font-family: var(--font-display); font-size: var(--text-xl); font-weight: 700; margin-bottom: var(--space-3); }
    .service-card__desc { font-size: var(--text-sm); color: var(--color-text-muted); line-height: 1.7; }
    .service-card__tags { display: flex; flex-wrap: wrap; gap: var(--space-2); margin-top: var(--space-5); }
    .tag {
      font-size: var(--text-xs); font-weight: 600; letter-spacing: 0.06em;
      padding: var(--space-1) var(--space-3); border-radius: var(--radius-full);
      background: oklch(from var(--color-primary) l c h / 0.12);
      color: var(--color-accent); border: 1px solid oklch(from var(--color-primary) l c h / 0.25);
    }
    .services__art { grid-column: span 3; height: 260px; border-radius: var(--radius-xl); overflow: hidden; }
    .services__art img { width: 100%; height: 100%; object-fit: cover; }
    @media (max-width: 900px) {
      .services__grid { grid-template-columns: 1fr; }
      .service-card--featured { grid-column: span 1; }
      .services__art { grid-column: span 1; }
    }

    /* ===================== PROCESS ===================== */
    .process__grid { display: grid; grid-template-columns: 1fr 1fr; gap: clamp(var(--space-8), 6vw, var(--space-20)); align-items: center; }
    .process__image { border-radius: var(--radius-xl); overflow: hidden; box-shadow: var(--shadow-lg); aspect-ratio: 4/3; }
    .process__image img { width: 100%; height: 100%; object-fit: cover; }
    .process__steps { display: flex; flex-direction: column; gap: var(--space-5); }
    .process-step {
      display: flex; gap: var(--space-5); align-items: flex-start;
      padding: var(--space-5); border-radius: var(--radius-lg);
      border: 1px solid transparent; transition: all var(--transition-interactive);
    }
    .process-step:hover { background: var(--color-surface); border-color: var(--color-divider); }
    .process-step__num {
      flex-shrink: 0; width: 44px; height: 44px; border-radius: var(--radius-full);
      background: var(--color-primary-highlight); color: var(--color-primary);
      display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: var(--text-sm);
    }
    .process-step__title { font-weight: 700; font-size: var(--text-base); margin-bottom: var(--space-1); }
    .process-step__desc { font-size: var(--text-sm); color: var(--color-text-muted); line-height: 1.65; }
    @media (max-width: 768px) { .process__grid { grid-template-columns: 1fr; } }
    /* ===================== TESTIMONIALS ===================== */
    .testimonials__grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-5); }
    .testi-card {
      background: var(--color-surface); border: 1px solid var(--color-border);
      border-radius: var(--radius-xl); padding: var(--space-7);
    }
    .testi-card__quote { font-size: var(--text-base); line-height: 1.75; color: var(--color-text-muted); margin-bottom: var(--space-6); }
    .testi-card__author { display: flex; align-items: center; gap: var(--space-3); }
    .testi-avatar { width: 44px; height: 44px; border-radius: var(--radius-full); background: var(--color-primary-highlight); display: flex; align-items: center; justify-content: center; font-weight: 800; color: var(--color-primary); font-size: var(--text-sm); flex-shrink: 0; }
    .testi-name { font-weight: 700; font-size: var(--text-sm); }
    .testi-role { font-size: var(--text-xs); color: var(--color-text-muted); }
    .testi-stars { color: var(--color-accent); font-size: var(--text-sm); letter-spacing: 2px; margin-bottom: var(--space-4); }
    @media (max-width: 900px) { .testimonials__grid { grid-template-columns: 1fr; } }

    /* ===================== CTA ===================== */
    .cta-section { position: relative; overflow: hidden; background: var(--color-surface); text-align: center; }
    .cta-section::before {
      content: ''; position: absolute; inset: 0;

<script>
  // Theme toggle
  (function(){
    const t = document.querySelector('[data-theme-toggle]');
    const r = document.documentElement;
    let d = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    r.setAttribute('data-theme', d);
    const sun = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
    const moon = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
    if(t) {
      t.innerHTML = d === 'dark' ? sun : moon;
      t.addEventListener('click', () => {
        d = d === 'dark' ? 'light' : 'dark';
        r.setAttribute('data-theme', d);
        t.innerHTML = d === 'dark' ? sun : moon;
        t.setAttribute('aria-label', 'Switch to ' + (d === 'dark' ? 'light' : 'dark') + ' mode');
      });
    }
  })();

  // Sticky nav
  const navbar = document.getElementById('navbar');
  window.addEventListener('scroll', () => {
    navbar.classList.toggle('scrolled', window.scrollY > 40);
  }, { passive: true });

  // Mobile menu
  const hamburger = document.getElementById('hamburger');
  const mobileMenu = document.getElementById('mobileMenu');
  document.getElementById('mobileClose').addEventListener('click', () => mobileMenu.classList.remove('open'));
  hamburger.addEventListener('click', () => mobileMenu.classList.add('open'));
  function closeMobile() { mobileMenu.classList.remove('open'); }
</script>
</body>
